<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome | Batman & My Moonlight</title>
    <meta name="description" content="A private love letter and story for Batman & My Moonlight." />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <div class="password-container">
      <div class="password-box">
        <h1>Enter Our Secret</h1>
        <p>This site is just for us. Please enter the password to continue.</p>
        <label for="pwd" class="sr-only">Password</label>
        <input type="password" id="pwd" placeholder="Password" />
        <button id="pwd-submit" type="button">Enter</button>
        <p id="error-message" style="color: var(--rose-dark); display: none;">Incorrect password. Try again.</p>
      </div>
    </div>

    <script>
      // simple password check; not secure for real secrets
      document.getElementById('pwd-submit').addEventListener('click', function () {
        const input = document.getElementById('pwd').value || '';
        if (input.toLowerCase() === 'batman') {
          window.location.href = 'home.html';
        } else {
          document.getElementById('error-message').style.display = 'block';
        }
      });
      // also allow Enter key to submit
      document.getElementById('pwd').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          document.getElementById('pwd-submit').click();
        }
      });
    </script>
  </body>
</html>
